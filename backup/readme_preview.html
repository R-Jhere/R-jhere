<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>README Preview</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css">
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .markdown-body {
            max-width: 900px;
            width: 100%;
            padding: 40px;
            background: #0d1117;
            border: 1px solid #00ff41;
            border-radius: 6px;
        }

        .markdown-body img {
            max-width: 100%;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <article class="markdown-body" id="content"></article>
    <script>
        fetch('./github_readme')
            .then(r => r.text())
            .then(readme => {
                marked.setOptions({ breaks: true, gfm: true });
                document.getElementById("content").innerHTML = marked.parse(readme);
            })
            .catch(() => {
                document.getElementById("content").innerHTML = "<p>Error loading README. Try opening via a local server.</p>";
            });
    </script>
</body>

</html>
